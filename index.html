<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>打卡表快速計算</title>
  <style>
    :root {
      --bg: #f7f2e8;
      --paper: #fffaf1;
      --ink: #27221c;
      --muted: #7b7164;
      --line: #e3d5bf;
      --brand: #c8641b;
      --brand2: #8c3b10;
      --green: #176f4f;
      --blue: #1f5b86;
      --red: #ad3f35;
      --shadow: 0 16px 36px rgba(48, 34, 20, .14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(200,100,27,.18), transparent 28rem),
        linear-gradient(180deg, #fffdf8, var(--bg));
      color: var(--ink);
    }

    .app {
      width: min(720px, calc(100% - 28px));
      margin: 0 auto;
      padding: 26px 0 46px;
    }

    .hero {
      margin-bottom: 18px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 7vw, 46px);
      letter-spacing: .02em;
      line-height: 1.1;
    }

    .sub {
      color: var(--muted);
      margin: 10px auto 0;
      line-height: 1.55;
      max-width: 560px;
      font-size: 15px;
    }

    .card {
      background: rgba(255,250,241,.94);
      border: 1px solid rgba(227,213,191,.92);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 20px;
      overflow: hidden;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    @media (max-width: 540px) {
      .actions { grid-template-columns: 1fr; }
    }

    .file-btn {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      min-height: 72px;
      border-radius: 20px;
      border: 1px solid var(--line);
      background: #fffdf8;
      color: var(--brand2);
      font-weight: 900;
      font-size: 18px;
      cursor: pointer;
      user-select: none;
      transition: transform .12s ease, box-shadow .12s ease;
    }

    .file-btn:first-child {
      background: var(--brand);
      color: white;
      border-color: var(--brand);
      box-shadow: 0 8px 20px rgba(200,100,27,.28);
    }

    .file-btn:hover { transform: translateY(-1px); }

    input[type="file"] { display: none; }

    .rule {
      margin: 14px 0 0;
      color: #675a4d;
      font-size: 13px;
      line-height: 1.6;
      background: #fff4e7;
      border-left: 4px solid var(--brand);
      border-radius: 14px;
      padding: 10px 12px;
    }

    .preview {
      display: none;
      margin-top: 16px;
      border-radius: 22px;
      overflow: hidden;
      border: 1px solid var(--line);
      background: #fff;
      max-height: 440px;
    }

    .preview img {
      width: 100%;
      max-height: 440px;
      display: block;
      object-fit: contain;
    }

    .loading {
      display: none;
      margin-top: 16px;
      border-radius: 22px;
      border: 1px solid var(--line);
      background: #fffdf8;
      padding: 18px;
      text-align: center;
    }

    .spinner {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 4px solid #eadbc7;
      border-top-color: var(--brand);
      margin: 0 auto 10px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .progress {
      color: var(--brand2);
      font-weight: 800;
      font-size: 15px;
    }

    .result {
      display: none;
      margin-top: 16px;
      background: #fffdf8;
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 18px;
    }

    .name {
      font-size: 22px;
      font-weight: 950;
      margin-bottom: 14px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .badge {
      font-size: 12px;
      color: var(--muted);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 10px;
      background: #fff8ee;
      font-weight: 800;
    }

    .numbers {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    @media (max-width: 620px) {
      .numbers { grid-template-columns: 1fr; }
    }

    .num-card {
      border: 1px solid var(--line);
      border-radius: 20px;
      background: #fffaf1;
      padding: 15px;
    }

    .label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
      margin-bottom: 4px;
    }

    .value {
      font-size: 38px;
      font-weight: 950;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .green { color: var(--green); }
    .blue { color: var(--blue); }
    .red { color: var(--red); }

    .copy-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    @media (max-width: 540px) {
      .copy-row { grid-template-columns: 1fr; }
    }

    button {
      border: 0;
      border-radius: 16px;
      padding: 13px 14px;
      font: inherit;
      font-weight: 900;
      cursor: pointer;
      background: var(--brand);
      color: white;
    }

    button.secondary {
      background: #fff4e7;
      color: var(--brand2);
      border: 1px solid var(--line);
    }

    .error {
      display: none;
      margin-top: 16px;
      border-radius: 20px;
      background: #fff0ed;
      border: 1px solid #efc4bd;
      color: var(--red);
      padding: 14px;
      line-height: 1.55;
      font-weight: 750;
    }

    details {
      margin-top: 14px;
      color: var(--muted);
      font-size: 13px;
    }

    summary {
      cursor: pointer;
      font-weight: 800;
      color: #6f6255;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: #fff8ee;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px;
      max-height: 220px;
      overflow: auto;
      font-size: 12px;
    }

    .footer {
      margin-top: 14px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
      text-align: center;
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <h1>打卡表快速計算</h1>
      <p class="sub">拍照或上傳打卡表，系統只讀機器打印時間，直接輸出姓名、平日前 2H、第 3H 起、遲到分鐘。</p>
    </section>

    <section class="card">
      <div class="actions">
        <label class="file-btn">
          📷 拍照
          <input id="cameraInput" type="file" accept="image/*" capture="environment">
        </label>

        <label class="file-btn">
          🖼️ 上傳照片
          <input id="uploadInput" type="file" accept="image/*">
        </label>
      </div>

      <div class="rule">
        規則：遲到超過 08:00 逐分鐘計；加班從 18:00 後開始，15–44 分 = 0.5H，45–59 分 = 1H；每日先拆前 2H / 第 3H 起。藍筆數字與手寫小計不納入。
      </div>

      <div id="preview" class="preview">
        <img id="previewImg" alt="打卡表照片">
      </div>

      <div id="loading" class="loading">
        <div class="spinner"></div>
        <div id="progress" class="progress">分析中...</div>
      </div>

      <div id="error" class="error"></div>

      <div id="result" class="result">
        <div class="name">
          <span id="nameText">姓名：—</span>
          <span id="confidenceText" class="badge">OCR</span>
        </div>

        <div class="numbers">
          <div class="num-card">
            <div class="label">平日前 2H</div>
            <div id="first2Text" class="value green">0</div>
          </div>

          <div class="num-card">
            <div class="label">第 3H 起</div>
            <div id="after2Text" class="value blue">0</div>
          </div>

          <div class="num-card">
            <div class="label">遲到分鐘</div>
            <div id="lateText" class="value red">0</div>
          </div>
        </div>

        <div class="copy-row">
          <button id="copyBtn" type="button">複製結果</button>
          <button id="resetBtn" type="button" class="secondary">重新拍 / 上傳</button>
        </div>

        <details>
          <summary>查看系統讀到的時間</summary>
          <pre id="debugText"></pre>
        </details>
      </div>
    </section>

    <div class="footer">
      純前端版本會受到照片角度、反光、打印淡墨影響。若讀不到姓名或時間，請重新拍清楚一點、讓整張卡片填滿畫面。
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script>
    const config = {
      workStart: '08:00',
      overtimeStart: '18:00'
    };

    let lastResultText = '';

    const cameraInput = document.getElementById('cameraInput');
    const uploadInput = document.getElementById('uploadInput');
    const preview = document.getElementById('preview');
    const previewImg = document.getElementById('previewImg');
    const loading = document.getElementById('loading');
    const progress = document.getElementById('progress');
    const errorBox = document.getElementById('error');
    const resultBox = document.getElementById('result');
    const nameText = document.getElementById('nameText');
    const confidenceText = document.getElementById('confidenceText');
    const first2Text = document.getElementById('first2Text');
    const after2Text = document.getElementById('after2Text');
    const lateText = document.getElementById('lateText');
    const debugText = document.getElementById('debugText');
    const copyBtn = document.getElementById('copyBtn');
    const resetBtn = document.getElementById('resetBtn');

    cameraInput.addEventListener('change', handleFile);
    uploadInput.addEventListener('change', handleFile);
    copyBtn.addEventListener('click', copyResult);
    resetBtn.addEventListener('click', resetApp);

    function resetApp() {
      cameraInput.value = '';
      uploadInput.value = '';
      preview.style.display = 'none';
      resultBox.style.display = 'none';
      errorBox.style.display = 'none';
      loading.style.display = 'none';
      previewImg.removeAttribute('src');
      lastResultText = '';
    }

    async function handleFile(event) {
      const file = event.target.files && event.target.files[0];
      if (!file) return;

      resetStateForNewImage();

      const imageUrl = await fileToDataUrl(file);
      previewImg.src = imageUrl;
      preview.style.display = 'block';

      await analyzeImage(imageUrl);
    }

    function resetStateForNewImage() {
      resultBox.style.display = 'none';
      errorBox.style.display = 'none';
      loading.style.display = 'block';
      progress.textContent = '準備分析...';
      debugText.textContent = '';
      lastResultText = '';
    }

    function fileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function analyzeImage(imageUrl) {
      if (!window.Tesseract) {
        showError('OCR 套件沒有載入成功，請確認網路連線後重試。');
        return;
      }

      try {
        const result = await Tesseract.recognize(imageUrl, 'eng+chi_tra', {
          logger: m => {
            if (m.status) {
              const pct = typeof m.progress === 'number' ? ` ${Math.round(m.progress * 100)}%` : '';
              progress.textContent = `分析中：${m.status}${pct}`;
            }
          }
        });

        const text = result.data.text || '';
        const confidence = Math.round(result.data.confidence || 0);
        const parsed = parseTimecardText(text);
        const calculated = calculate(parsed.rows);

        if (parsed.rows.length === 0) {
          showError('沒有讀到可用的機器打印時間。請重新拍照，讓打卡時間更清楚、卡片更平整。');
          debugText.textContent = text.trim();
          return;
        }

        showResult(parsed, calculated, confidence, text);
      } catch (err) {
        console.error(err);
        showError('分析失敗。請重新拍照或換一張較清楚的圖片。');
      }
    }

    function parseTimecardText(rawText) {
      const text = normalize(rawText);
      const lines = text.split(/\n+/).map(s => s.trim()).filter(Boolean);

      const name = extractName(lines, text);
      const rows = extractRows(lines, text);

      return { name, rows };
    }

    function normalize(text) {
      return String(text || '')
        .replace(/：/g, ':')
        .replace(/[|｜]/g, ' ')
        .replace(/[，,]/g, ' ')
        .replace(/[－—–]/g, '-')
        .replace(/\t/g, ' ')
        .replace(/[０-９]/g, d => String.fromCharCode(d.charCodeAt(0) - 65248));
    }

    function extractName(lines, text) {
      const joined = lines.join(' ');

      const direct = joined.match(/(?:姓名|名)\s*[:：]?\s*([\u4e00-\u9fff]{2,4})/);
      if (direct) return direct[1];

      // Look for a short Chinese name near the top of the OCR text.
      const top = lines.slice(0, 8).join(' ');
      const candidates = [...top.matchAll(/[\u4e00-\u9fff]{2,4}/g)]
        .map(m => m[0])
        .filter(w => !/(打卡|考勤|月份|姓名|卡號|公司|部門|上班|下班|時分|日期|AMANO)/.test(w));

      return candidates[0] || '未讀到姓名';
    }

    function extractRows(lines, fullText) {
      const rows = [];

      for (const line of lines) {
        if (/(姓名|卡號|AMANO|考勤|月份|日期|年假|公半|請假|加班|遲到|合計|總計)/i.test(line)) continue;

        const times = extractTimes(line);
        if (times.length < 2) continue;

        const day = extractDay(line);
        rows.push({
          date: day || '',
          clockIn: times[0],
          clockOut: times[times.length - 1],
          source: line
        });
      }

      if (rows.length > 0) return dedupeRows(rows);

      // Fallback: scan tokens across the whole OCR result.
      const tokens = fullText.match(/\b(?:[1-9]|[12]\d|3[01]|[0-2]?\d[:.：][0-5]\d)\b/g) || [];
      const fallback = [];
      for (let i = 0; i < tokens.length - 2; i++) {
        const d = tokens[i];
        const t1 = tokens[i + 1];
        const t2 = tokens[i + 2];

        if (/^([1-9]|[12]\d|3[01])$/.test(d) && isTime(t1) && isTime(t2)) {
          fallback.push({
            date: d,
            clockIn: cleanTime(t1),
            clockOut: cleanTime(t2),
            source: `${d} ${t1} ${t2}`
          });
          i += 2;
        }
      }

      return dedupeRows(fallback);
    }

    function extractTimes(line) {
      const matches = [...line.matchAll(/\b([0-2]?\d)[:.：]([0-5]\d)\b/g)];
      return matches
        .map(m => cleanTime(`${m[1]}:${m[2]}`))
        .filter(Boolean)
        .filter(t => {
          const min = timeToMinutes(t);
          // Work card useful punches are usually 05:00-23:59.
          return min >= 300 && min <= 1439;
        });
    }

    function extractDay(line) {
      const match = line.match(/(?:^|\s)([1-9]|[12]\d|3[01])(?:\s|日|號|$)/);
      return match ? match[1] : '';
    }

    function isTime(value) {
      return /^[0-2]?\d[:.：][0-5]\d$/.test(value);
    }

    function cleanTime(value) {
      const m = String(value || '').trim().match(/^([0-2]?\d)[:.：]([0-5]\d)$/);
      if (!m) return '';
      const h = Number(m[1]);
      const min = Number(m[2]);
      if (h > 23 || min > 59) return '';
      return String(h).padStart(2, '0') + ':' + String(min).padStart(2, '0');
    }

    function dedupeRows(rows) {
      const seen = new Set();
      const out = [];

      for (const r of rows) {
        const key = `${r.date}-${r.clockIn}-${r.clockOut}`;
        if (seen.has(key)) continue;
        seen.add(key);
        out.push(r);
      }

      return out;
    }

    function calculate(rows) {
      let totalFirst2 = 0;
      let totalAfter2 = 0;
      let totalLate = 0;

      const breakdown = rows.map(row => {
        const late = lateMinutes(row.clockIn);
        const otTotal = overtimeHours(row.clockOut);
        const first2 = Math.min(otTotal, 2);
        const after2 = Math.max(0, otTotal - 2);

        totalLate += late;
        totalFirst2 += first2;
        totalAfter2 += after2;

        return {
          ...row,
          late,
          overtimeTotal: otTotal,
          first2,
          after2
        };
      });

      return {
        first2: totalFirst2,
        after2: totalAfter2,
        late: totalLate,
        breakdown
      };
    }

    function lateMinutes(clockIn) {
      const inMin = timeToMinutes(clockIn);
      const startMin = timeToMinutes(config.workStart);
      if (inMin === null || startMin === null) return 0;
      return Math.max(0, inMin - startMin);
    }

    function overtimeHours(clockOut) {
      const outMin = timeToMinutes(clockOut);
      const startMin = timeToMinutes(config.overtimeStart);
      if (outMin === null || startMin === null) return 0;

      const raw = Math.max(0, outMin - startMin);
      const fullHours = Math.floor(raw / 60);
      const rem = raw % 60;

      if (rem >= 45) return fullHours + 1;
      if (rem >= 15) return fullHours + 0.5;
      return fullHours;
    }

    function timeToMinutes(t) {
      const clean = cleanTime(t);
      if (!clean) return null;
      const [h, m] = clean.split(':').map(Number);
      return h * 60 + m;
    }

    function fmt(n) {
      return Number.isInteger(n) ? String(n) : n.toFixed(1);
    }

    function showResult(parsed, calculated, confidence, rawText) {
      loading.style.display = 'none';
      errorBox.style.display = 'none';

      nameText.textContent = `姓名：${parsed.name}`;
      confidenceText.textContent = `OCR 信心 ${confidence}%`;
      first2Text.textContent = fmt(calculated.first2);
      after2Text.textContent = fmt(calculated.after2);
      lateText.textContent = String(calculated.late);

      lastResultText = [
        parsed.name,
        `平日前2H：${fmt(calculated.first2)}`,
        `平日第3H起：${fmt(calculated.after2)}`,
        `遲到分鐘：${calculated.late}`
      ].join('\n');

      debugText.textContent =
        calculated.breakdown.map(r =>
          `${r.date || '?'}｜${r.clockIn} - ${r.clockOut}｜前2H ${fmt(r.first2)}｜第3H起 ${fmt(r.after2)}｜遲到 ${r.late}分`
        ).join('\n') +
        '\n\n--- OCR 原始文字 ---\n' +
        rawText.trim();

      resultBox.style.display = 'block';
    }

    function showError(message) {
      loading.style.display = 'none';
      resultBox.style.display = 'none';
      errorBox.textContent = message;
      errorBox.style.display = 'block';
    }

    async function copyResult() {
      if (!lastResultText) return;
      try {
        await navigator.clipboard.writeText(lastResultText);
      } catch {
        const ta = document.createElement('textarea');
        ta.value = lastResultText;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        ta.remove();
      }
      copyBtn.textContent = '已複製';
      setTimeout(() => copyBtn.textContent = '複製結果', 1200);
    }
  </script>
</body>
</html>
